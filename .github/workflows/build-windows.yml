name: Build Windows Binary

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Download npcap SDK
        shell: powershell
        run: |
          Invoke-WebRequest -Uri "https://npcap.com/dist/npcap-sdk-1.13.zip" -OutFile "npcap-sdk.zip"
          Expand-Archive -Path "npcap-sdk.zip" -DestinationPath "npcap-sdk"

      - name: Install npcap
        shell: powershell
        run: |
          Invoke-WebRequest -Uri "https://npcap.com/dist/npcap-1.79.exe" -OutFile "npcap-installer.exe"
          Start-Process -FilePath ".\npcap-installer.exe" -ArgumentList "/S" -Wait

      - name: Build
        shell: powershell
        env:
          LIB: ${{ github.workspace }}\npcap-sdk\Lib\x64
        run: cargo build --release

      - name: Run tests
        shell: powershell
        env:
          LIB: ${{ github.workspace }}\npcap-sdk\Lib\x64
        run: cargo test --lib

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: flashback-windows
          path: target/release/flashback.exe
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: flashback-windows

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: flashback.exe
