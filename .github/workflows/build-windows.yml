name: Build Windows Binary

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Run tests
        run: dotnet test recorder/Tests/FlashbackRecorder.Tests.csproj --configuration Release

  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Build
        run: dotnet publish recorder/FlashbackRecorder.csproj --configuration Release --output publish

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: flashback-recorder-windows
          path: publish/
          retention-days: 30

  release:
    needs: [test, build]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: flashback-recorder-windows
          path: flashback-recorder

      - name: Zip release
        run: cd flashback-recorder && zip -r ../FlashbackRecorder.zip .

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: FlashbackRecorder.zip
